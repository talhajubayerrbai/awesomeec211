---
- name: Configure Python/FastAPI application on private EC2 instance
  hosts: all
  become: true

  vars:
    app_dir: /opt/app
    venv_dir: /opt/app/.venv
    app_user: ubuntu
    ansible_remote_tmp: /tmp/.ansible.tmp

  tasks:
    #  1. System packages 
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install system packages
      ansible.builtin.apt:
        name:
          - python3.12
          - python3.12-venv
          - python3.12-dev
          - python3-pip
          - git
          - curl
          - build-essential
        state: present

    #  2. Application directory 
    - name: Create application directory
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0755"

    #  3. Copy application source 
    - name: Copy app package directory
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../app/"
        dest: "{{ app_dir }}/app/"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0644"
        directory_mode: "0755"

    - name: Copy main.py entrypoint
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../main.py"
        dest: "{{ app_dir }}/main.py"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0644"

    - name: Copy requirements.txt
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../requirements.txt"
        dest: "{{ app_dir }}/requirements.txt"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0644"

    - name: Check if public/ directory exists locally
      ansible.builtin.set_fact:
        public_dir_files: "{{ lookup('fileglob', playbook_dir + '/../public/*', wantlist=True) }}"

    - name: Create public directory on remote
      ansible.builtin.file:
        path: "{{ app_dir }}/public"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0755"
      when: public_dir_files | length > 0

    - name: Copy public/ directory if it exists
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../public/"
        dest: "{{ app_dir }}/public/"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0644"
        directory_mode: "0755"
      when: public_dir_files | length > 0

    #  4. Python virtual environment 
    - name: Create Python 3.12 virtual environment
      ansible.builtin.command:
        cmd: python3.12 -m venv "{{ venv_dir }}"
        creates: "{{ venv_dir }}/bin/activate"

    - name: Set ownership of venv directory to ubuntu
      ansible.builtin.file:
        path: "{{ venv_dir }}"
        state: directory
        recurse: true
        owner: "{{ app_user }}"
        group: "{{ app_user }}"

    #  5. Install Python dependencies 
    - name: Upgrade pip in virtualenv
      ansible.builtin.command:
        cmd: "{{ venv_dir }}/bin/pip install --upgrade pip"

    - name: Install application requirements
      ansible.builtin.pip:
        requirements: "{{ app_dir }}/requirements.txt"
        virtualenv: "{{ venv_dir }}"
        virtualenv_python: python3.12

    - name: Ensure gunicorn and uvicorn are installed
      ansible.builtin.pip:
        name:
          - gunicorn
          - uvicorn[standard]
        virtualenv: "{{ venv_dir }}"
        virtualenv_python: python3.12

    #  6. Set final ownership of entire app directory 
    - name: Set ownership of entire app directory
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        recurse: true
        owner: "{{ app_user }}"
        group: "{{ app_user }}"

    #  7. Systemd service 
    - name: Deploy systemd unit file for app service
      ansible.builtin.copy:
        dest: /etc/systemd/system/app.service
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=FastAPI Application (awesomeec211)
          After=network.target

          [Service]
          Type=simple
          User={{ app_user }}
          Group={{ app_user }}
          WorkingDirectory={{ app_dir }}
          ExecStart={{ venv_dir }}/bin/gunicorn app.main:app \
            -k uvicorn.workers.UvicornWorker \
            -w 4 \
            -b 0.0.0.0:8000 \
            --access-logfile - \
            --error-logfile -
          Restart=always
          RestartSec=5
          Environment=APP_ENV=production
          Environment=PORT=8000

          [Install]
          WantedBy=multi-user.target

    - name: Reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Enable and start app service
      ansible.builtin.systemd:
        name: app
        enabled: true
        state: restarted

    - name: Wait for app to respond on port 8000
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: 8000
        timeout: 60
        delay: 5