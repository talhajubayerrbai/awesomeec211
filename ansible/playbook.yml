---
- name: Configure Python FastAPI application
  hosts: all
  gather_facts: true
  become: true

  vars:
    app_dir: /opt/app
    venv_dir: /opt/app/.venv
    app_user: ubuntu
    app_port: 8000
    ansible_remote_tmp: /tmp/.ansible.tmp
    ansible_python_interpreter: /usr/bin/python3

  tasks:
    # 
    # System packages
    # 
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install system packages
      ansible.builtin.apt:
        name:
          - python3
          - python3-pip
          - python3-venv
          - python3-dev
          - build-essential
          - curl
          - git
        state: present

    # 
    # Application directory
    # 
    - name: Create application directory
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        mode: "0755"
        owner: root
        group: root

    # 
    # Copy application source (avoid delegate_to / local_action)
    # 
    - name: Copy main entrypoint
      ansible.builtin.copy:
        src: main.py
        dest: "{{ app_dir }}/main.py"
        mode: "0644"

    - name: Copy app package directory
      ansible.builtin.copy:
        src: app/
        dest: "{{ app_dir }}/app/"
        mode: "0644"

    - name: Copy requirements.txt
      ansible.builtin.copy:
        src: requirements.txt
        dest: "{{ app_dir }}/requirements.txt"
        mode: "0644"

    - name: Check if public directory exists locally
      ansible.builtin.set_fact:
        public_dir_files: "{{ lookup('fileglob', 'public/*', wantlist=True) }}"

    - name: Copy public directory if it exists
      ansible.builtin.copy:
        src: public/
        dest: "{{ app_dir }}/public/"
        mode: "0644"
      when: public_dir_files | length > 0

    - name: Set ownership of application directory
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        recurse: true
        owner: "{{ app_user }}"
        group: "{{ app_user }}"

    # 
    # Python virtual environment
    # 
    - name: Create virtual environment
      ansible.builtin.command:
        cmd: python3 -m venv "{{ venv_dir }}"
        creates: "{{ venv_dir }}/bin/activate"

    - name: Set ownership of venv directory to ubuntu
      ansible.builtin.file:
        path: "{{ venv_dir }}"
        state: directory
        recurse: true
        owner: "{{ app_user }}"
        group: "{{ app_user }}"

    - name: Upgrade pip inside venv
      ansible.builtin.command:
        cmd: "{{ venv_dir }}/bin/pip install --upgrade pip"
      changed_when: true

    - name: Install Python dependencies
      ansible.builtin.command:
        cmd: "{{ venv_dir }}/bin/pip install -r {{ app_dir }}/requirements.txt"
      changed_when: true

    # 
    # Systemd service
    # 
    - name: Deploy systemd unit file
      ansible.builtin.copy:
        dest: /etc/systemd/system/app.service
        mode: "0644"
        content: |
          [Unit]
          Description=FastAPI Application (awesomeec211)
          After=network.target

          [Service]
          Type=simple
          User={{ app_user }}
          Group={{ app_user }}
          WorkingDirectory={{ app_dir }}
          Environment="PORT={{ app_port }}"
          Environment="APP_ENV=production"
          ExecStart={{ venv_dir }}/bin/gunicorn app.main:app \
            -k uvicorn.workers.UvicornWorker \
            -w 4 \
            -b 0.0.0.0:{{ app_port }}
          Restart=always
          RestartSec=5
          StandardOutput=journal
          StandardError=journal
          SyslogIdentifier=app

          [Install]
          WantedBy=multi-user.target

    - name: Reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Enable and start app service
      ansible.builtin.systemd:
        name: app
        enabled: true
        state: restarted